name: Deploy Standalone OpenShift 4 Cluster

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  openshift-local:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # Ensure QEMU/KVM virtualization dependencies are ready
          sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils

      - name: Download and Install OpenShift Local (CRC)
        run: |
          cd /tmp
          # Fetch the latest stable Linux binary release
          curl -L -o crc-linux.tar.xz "https://developers.redhat.com/content-gateway/rest/mirror/pub/openshift-v4/clients/crc/latest/crc-linux-amd64.tar.xz"
          tar -xvf crc-linux.tar.xz
          # Move binary to path
          sudo mv crc-*-linux-amd64/crc /usr/local/bin/crc
          rm -rf crc-linux.tar.xz crc-*-linux-amd64

      - name: Setup OpenShift Local Environment
        run: |
          # Configure CRC to use appropriate system resources
          crc config set cpus 4
          crc config set memory 10240
          crc config set preset microshift
          
          # Initialize environment for cluster
          crc setup

      - name: Start OpenShift 4 Cluster
        env:
          # Securely inject your Red Hat OpenShift Pull Secret from GitHub Secrets
          CRC_PULL_SECRET: ${{ secrets.OPENSHIFT_PULL_SECRET }}
        run: |
          # Write pull secret to local file path temporary target
          echo "$CRC_PULL_SECRET" > /tmp/pull-secret.txt
          
          # Boot up the single node OCP4 instance
          crc start --pull-secret-file /tmp/pull-secret.txt
          
          rm -f /tmp/pull-secret.txt

      - name: Verify Cluster Connectivity
        run: |
          # Load the cluster's login environment variables
          eval $(crc oc-env)
          
          # Authenticate using the default kubeadmin credentials generated by CRC
          oc login -u kubeadmin -p $(crc console --credentials | grep kubeadmin | awk '{print $NF}') https://api.crc.testing:6443 --insecure-skip-tls-verify
          
          # Confirm cluster state
          oc get nodes
          oc get clusterversion